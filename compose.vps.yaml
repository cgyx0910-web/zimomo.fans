services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guge}
      POSTGRES_DB: ${POSTGRES_DB:-guge}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-production}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      # 注意：DATABASE_URL 中的密码必须与 POSTGRES_PASSWORD 一致
      DATABASE_URL: ${DATABASE_URL:-postgresql://guge:${POSTGRES_PASSWORD:-guge}@postgres:5432/guge}
      DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-production}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
