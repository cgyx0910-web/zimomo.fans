name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PNPM_VERSION: "9.15.4"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build web
        env:
          DATABASE_URL: postgresql://guge:guge@127.0.0.1:5432/guge
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          DEPLOYMENT_ENV: development
          ADMIN_JWT_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
          USER_JWT_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
          ADMIN_PASSWORD_HASH: $2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy
        run: pnpm build

  docker-image:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: |
            DEPLOYMENT_ENV=development
            NEXT_PUBLIC_SITE_URL=http://localhost:3000
          tags: guge-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
